<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remember Again</title>
    <meta name="description"
        content="WDD 131 – Dynamic Web Fundamentals - Helamã Yamashita Barbour - Home page for the remember again website">
    <meta name="author" content="Helamã Yamashita Barbour">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/feedback.css">
    <link rel="stylesheet" href="styles/feedback-large.css">
    <script src="scripts/feedbackForm.js" defer></script>
</head>

<body>
    <header>
        <h1>Remember Again</h1>
        <nav>
            <p id="navBtp">--</p>
            <ul></ul>
        </nav>
    </header>
    <main>
        <h1>Want to talk to us?</h1>
        <h2>We'd love to hear from you! Whether you have questions, feedback, or just want to say hello, feel free to
            reach out to us. Your thoughts and ideas are important to us, and we're here to listen.</h2>
        <form method="post">
            <fieldset>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </fieldset>
            <fieldset>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </fieldset>
            <fieldset>
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </fieldset>
            <button type="button" id="sendFeedback">Send Message</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Remember Again. All rights reserved.</p>
    </footer>
</body>

</html>
